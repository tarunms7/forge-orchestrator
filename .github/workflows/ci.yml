name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e '.[dev,web]'

      - name: Ruff lint
        run: ruff check forge/

      - name: Ruff format check
        run: ruff format --check forge/

      - name: Run tests
        run: |
          python -m pytest forge/ -q --timeout=120 \
            --ignore=forge/tests/integration \
            --ignore=forge/core/integration_test.py \
            -k "not test_pipeline_lifecycle"

  frontend:
    name: Next.js Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
